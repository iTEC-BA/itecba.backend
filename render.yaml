services:
  - type: web
    name: itecba-backend
    env: node
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: YOUTUBE_DL_SKIP_DOWNLOAD
        value: "true"
      # Agregar las demás vars desde el dashboard de Render:
      # MONGODB_URI, FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL,
      # FIREBASE_PRIVATE_KEY, GROQ_API_KEY, SUPABASE_URL,
      # SUPABASE_SERVICE_KEY, TURSO_URL, TURSO_AUTH_TOKEN,
      # VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_EMAIL,
      # EMAIL_USER, EMAIL_PASS, FRONTEND_URL
